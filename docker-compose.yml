version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sw_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-smart_workshop}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sw_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-smart_workshop}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - sw_network

  frontend:
    build:
      context: ./smart-workshop
      dockerfile: Dockerfile
    container_name: sw_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sw_network

volumes:
  pgdata:
  backend_uploads:
  backend_logs:

networks:
  sw_network:
    driver: bridge
